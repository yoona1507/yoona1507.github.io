let mode='quiz',currentCat='전체',currentQ=0,quizSet=[],answered={},wrongSet=new Set(),bookmarks=new Set();
const LS_KEY='fm_quiz_';
function loadState(){try{const d=JSON.parse(localStorage.getItem(LS_KEY+'state')||'{}');answered=d.answered||{};wrongSet=new Set(d.wrongSet||[]);bookmarks=new Set(d.bookmarks||[])}catch(e){}}
function saveState(){localStorage.setItem(LS_KEY+'state',JSON.stringify({answered,wrongSet:[...wrongSet],bookmarks:[...bookmarks]}))}
function getCats(){return['전체',...[...new Set(questions.map(q=>q.cat))]]}
function updateStats(){const done=Object.keys(answered).length;const correct=Object.values(answered).filter(v=>v).length;const wrong=done-correct;document.getElementById('st-done').textContent=done;document.getElementById('st-correct').textContent=correct;document.getElementById('st-wrong').textContent=wrong;document.getElementById('st-rate').textContent=done?Math.round(correct/done*100)+'%':'0%';document.getElementById('total-q').textContent=questions.length}
function renderCats(){const el=document.getElementById('cat-filters');el.innerHTML=getCats().map(c=>`<div class="cat-btn${c===currentCat?' active':''}" data-cat="${c}">${c} (${c==='전체'?questions.length:questions.filter(q=>q.cat===c).length})</div>`).join('');el.querySelectorAll('.cat-btn').forEach(b=>b.onclick=()=>{currentCat=b.dataset.cat;renderCats();render()})}
function getFiltered(){let qs=currentCat==='전체'?[...questions]:questions.filter(q=>q.cat===currentCat);const search=document.getElementById('search-box').value.trim().toLowerCase();if(search)qs=qs.filter(q=>(q.q+q.opts.join('')+q.exp+(q.cat||'')).toLowerCase().includes(search));return qs}
function render(){const area=document.getElementById('quiz-area');const pb=document.getElementById('progress-bar');const sb=document.getElementById('search-box');pb.classList.add('hidden');sb.classList.add('hidden');if(mode==='quiz'){quizSet=getFiltered();currentQ=0;if(!quizSet.length){area.innerHTML='<p style="text-align:center;color:var(--text2)">해당 카테고리에 문제가 없습니다.</p>';return}renderQuiz()}else if(mode==='study'){sb.classList.remove('hidden');renderStudy()}else if(mode==='wrong'){renderWrong()}else if(mode==='bookmark'){renderBookmark()}else if(mode==='random'){quizSet=shuffle([...questions]).slice(0,20);currentQ=0;renderQuiz()}}
function renderQuiz(){const area=document.getElementById('quiz-area');const pb=document.getElementById('progress-bar');pb.classList.remove('hidden');if(currentQ>=quizSet.length){const correct=quizSet.filter(q=>answered[q.id]).length;const pct=Math.round(correct/quizSet.length*100);area.innerHTML=`<div class="result-card"><div class="score">${pct}%</div><div class="msg">${quizSet.length}문제 중 ${correct}문제 정답</div><div class="btn-row" style="justify-content:center"><button class="btn btn-primary" onclick="currentQ=0;render()">다시 풀기</button><button class="btn btn-secondary" onclick="mode='wrong';render()">오답 보기</button></div></div>`;return}document.getElementById('progress-fill').style.width=((currentQ)/quizSet.length*100)+'%';const q=quizSet[currentQ];const isAnswered=q.id in answered;const bm=bookmarks.has(q.id);area.innerHTML=`<div class="q-card"><div class="q-num"><span>${currentQ+1} / ${quizSet.length}</span><span><span class="bookmark-btn${bm?' active':''}" onclick="toggleBm(${q.id})">★</span> <span class="q-cat">${q.cat}</span></span></div><div class="q-text">${q.q}</div><div class="options">${q.opts.map((o,i)=>{let cls='opt';if(isAnswered){const sel=answered[q.id+'_sel'];if(i===q.ans)cls+=' correct show-correct';if(i===sel&&sel!==q.ans)cls+=' wrong';if(i===sel&&sel===q.ans)cls+=' correct'}return`<div class="${cls}" data-i="${i}" onclick="selectOpt(${q.id},${i})">${String.fromCharCode(9312+i)} ${o}</div>`}).join('')}</div><div class="explanation${isAnswered?' show':''}"><h4>해설</h4>${q.exp}</div>${isAnswered?`<div class="btn-row"><button class="btn btn-primary" onclick="nextQ()">다음 문제 →</button></div>`:''}</div>`}
function selectOpt(qid,i){if(qid in answered)return;const q=questions.find(x=>x.id===qid);const correct=i===q.ans;answered[qid]=correct;answered[qid+'_sel']=i;if(!correct)wrongSet.add(qid);else wrongSet.delete(qid);saveState();updateStats();renderQuiz()}
function nextQ(){currentQ++;renderQuiz()}
function toggleBm(id){bookmarks.has(id)?bookmarks.delete(id):bookmarks.add(id);saveState();render()}
function renderStudy(){const qs=getFiltered();const area=document.getElementById('quiz-area');if(!qs.length){area.innerHTML='<p style="text-align:center;color:var(--text2)">검색 결과가 없습니다.</p>';return}area.innerHTML=qs.map(q=>`<div class="study-card"><div class="q-num"><span>#${q.id}</span><span><span class="bookmark-btn${bookmarks.has(q.id)?' active':''}" onclick="toggleBm(${q.id})">★</span> <span class="q-cat">${q.cat}</span></span></div><div class="q">${q.q}</div><div class="a">정답: ${String.fromCharCode(9312+q.ans)} ${q.opts[q.ans]}</div><div class="e">${q.exp}</div></div>`).join('')}
function renderWrong(){const area=document.getElementById('quiz-area');const ws=[...wrongSet].map(id=>questions.find(q=>q.id===id)).filter(Boolean);if(!ws.length){area.innerHTML='<div class="mode-desc">오답이 없습니다! 🎉</div>';return}area.innerHTML=`<div class="mode-desc">틀린 문제 ${ws.length}개</div><div class="btn-row" style="margin-bottom:16px"><button class="btn btn-primary" onclick="quizSet=[...wrongSet].map(id=>questions.find(q=>q.id===id)).filter(Boolean);currentQ=0;mode='quiz';renderQuiz()">오답 다시 풀기</button><button class="btn btn-danger" onclick="wrongSet.clear();saveState();render()">오답 초기화</button></div>`+ws.map(q=>`<div class="study-card"><div class="q-num"><span>#${q.id}</span><span class="q-cat">${q.cat}</span></div><div class="q">${q.q}</div><div class="a">정답: ${String.fromCharCode(9312+q.ans)} ${q.opts[q.ans]}</div><div class="e">${q.exp}</div></div>`).join('')}
function renderBookmark(){const area=document.getElementById('quiz-area');const bs=[...bookmarks].map(id=>questions.find(q=>q.id===id)).filter(Boolean);if(!bs.length){area.innerHTML='<div class="mode-desc">북마크한 문제가 없습니다. ★를 눌러 추가하세요.</div>';return}area.innerHTML=`<div class="mode-desc">북마크 ${bs.length}개</div><div class="btn-row" style="margin-bottom:16px"><button class="btn btn-primary" onclick="quizSet=[...bookmarks].map(id=>questions.find(q=>q.id===id)).filter(Boolean);currentQ=0;mode='quiz';renderQuiz()">북마크 퀴즈</button></div>`+bs.map(q=>`<div class="study-card"><div class="q-num"><span>#${q.id}</span><span><span class="bookmark-btn active" onclick="toggleBm(${q.id})">★</span> <span class="q-cat">${q.cat}</span></span></div><div class="q">${q.q}</div><div class="a">정답: ${String.fromCharCode(9312+q.ans)} ${q.opts[q.ans]}</div><div class="e">${q.exp}</div></div>`).join('')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');mode=t.dataset.mode;render()});
document.getElementById('search-box').addEventListener('input',()=>{if(mode==='study')renderStudy()});
loadState();updateStats();renderCats();render();
</script>
</body>
