<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1b3a">
<title>일본어 문법 연습문제</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    --bg-1: #0f1020;
    --bg-2: #1a1b3a;
    --bg-3: #2d1b4e;
    --text: #f5f5ff;
    --text-muted: #a8a8c8;
    --accent: #a78bfa;
    --accent-soft: rgba(167, 139, 250, 0.15);
    --correct: #4ade80;
    --correct-soft: rgba(74, 222, 128, 0.15);
    --wrong: #f87171;
    --wrong-soft: rgba(248, 113, 113, 0.15);
    --card: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.12);
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: "Hiragino Sans", "Noto Sans JP", "Noto Sans KR",
      -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-attachment: fixed;
    overflow-x: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-tap-highlight-color: transparent;
  }

  /* Ruby (furigana) */
  ruby { ruby-align: center; }
  rt { font-size: 0.55em; color: var(--text-muted); font-weight: 400; }

  /* 홈 버튼 */
  .hub-home-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0) + 10px);
    left: calc(env(safe-area-inset-left, 0) + 10px);
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    font: 600 13px/1 inherit;
    color: #fff;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 999px;
    text-decoration: none;
  }
  .hub-home-btn:hover { background: var(--accent); }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 20px 40px;
  }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 800;
    margin: 0 0 8px;
    text-align: center;
    letter-spacing: -0.02em;
  }
  .sub {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  /* ==================== 모드 선택 화면 ==================== */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .mode-card {
    padding: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: inherit;
    font-family: inherit;
  }
  .mode-card:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .mode-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .mode-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .mode-title { font-size: 16px; font-weight: 700; margin: 0 0 4px; }
  .mode-desc { font-size: 12px; color: var(--text-muted); margin: 0; }
  .mode-count {
    display: inline-block;
    margin-top: 8px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 10px;
  }

  .settings {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .settings label {
    font-size: 13px;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
  }
  .settings input[type="radio"] { accent-color: var(--accent); }

  .best-scores {
    margin-top: 20px;
    padding: 16px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .best-scores h3 {
    margin: 0 0 10px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .best-scores ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
  .best-scores li {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px dashed rgba(255,255,255,0.08);
  }
  .best-scores li:last-child { border-bottom: 0; }
  .best-scores .score { color: var(--accent); font-weight: 700; }

  /* ==================== 퀴즈 화면 ==================== */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--card);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff6b9d);
    transition: width 0.4s ease;
    border-radius: 3px;
  }

  .question-card {
    padding: 28px 24px;
    background: var(--card);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
  }
  .question-cat {
    display: inline-block;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 10px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .question-text {
    font-size: 17px;
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .question-text .big {
    display: inline-block;
    font-size: 26px;
    font-weight: 700;
    padding: 4px 12px;
    margin: 4px 2px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 8px;
  }

  /* 객관식 옵션 */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.15s;
    width: 100%;
  }
  .option:hover:not(:disabled) {
    background: var(--accent-soft);
    border-color: var(--accent);
    transform: translateX(2px);
  }
  .option:disabled { cursor: default; }
  .option .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    flex-shrink: 0;
  }
  .option.selected { background: var(--accent-soft); border-color: var(--accent); }
  .option.correct {
    background: var(--correct-soft);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option.correct .num { background: var(--correct); color: #000; }
  .option.wrong {
    background: var(--wrong-soft);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option.wrong .num { background: var(--wrong); color: #000; }

  /* 단답형 입력 */
  .input-wrap {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .input-wrap input {
    flex: 1;
    padding: 14px 16px;
    font-size: 17px;
    color: var(--text);
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
    ime-mode: active;
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    background: rgba(0,0,0,0.45);
  }
  .input-wrap input.correct { border-color: var(--correct); color: var(--correct); }
  .input-wrap input.wrong { border-color: var(--wrong); color: var(--wrong); }
  .input-wrap input:disabled { opacity: 1; }

  .btn {
    padding: 14px 24px;
    font: 700 15px/1 inherit;
    color: #fff;
    background: var(--accent);
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #8b6ff5; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn.ghost:hover { background: var(--card); color: var(--text); }
  .btn.wide { width: 100%; padding: 16px; font-size: 16px; }

  /* 피드백 */
  .feedback {
    margin-top: 16px;
    padding: 16px 18px;
    border-radius: 12px;
    animation: slideUp 0.25s ease;
  }
  .feedback.correct {
    background: var(--correct-soft);
    border-left: 4px solid var(--correct);
  }
  .feedback.wrong {
    background: var(--wrong-soft);
    border-left: 4px solid var(--wrong);
  }
  .feedback .result {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .feedback.correct .result { color: var(--correct); }
  .feedback.wrong .result { color: var(--wrong); }
  .feedback .correct-answer {
    font-size: 14px;
    margin: 4px 0 8px;
    color: var(--text);
  }
  .feedback .correct-answer b {
    color: var(--correct);
    padding: 2px 8px;
    background: var(--correct-soft);
    border-radius: 4px;
  }
  .feedback .explain {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .feedback .explain b { color: var(--accent); }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ==================== 결과 화면 ==================== */
  .result-screen {
    text-align: center;
    padding: 40px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  .result-emoji { font-size: 64px; margin-bottom: 12px; }
  .result-score {
    font-size: 48px;
    font-weight: 800;
    margin: 12px 0;
    background: linear-gradient(135deg, var(--accent), #ff6b9d);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result-fraction {
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .result-comment {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .result-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .wrong-review {
    margin-top: 30px;
    padding: 20px;
    background: rgba(0,0,0,0.25);
    border-radius: 14px;
    text-align: left;
  }
  .wrong-review h3 {
    margin: 0 0 12px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .wrong-review-item {
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--wrong-soft);
    border-left: 3px solid var(--wrong);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
  }
  .wrong-review-item .q { margin-bottom: 4px; }
  .wrong-review-item .a { color: var(--text-muted); font-size: 12px; }

  .hidden { display: none !important; }

  /* 모바일 */
  @media (max-width: 640px) {
    main { padding: 58px 14px 30px; }
    .question-card { padding: 20px 16px; }
    .question-text { font-size: 16px; }
    .question-text .big { font-size: 22px; padding: 3px 10px; }
    .option { padding: 12px 14px; font-size: 14px; }
    .btn { padding: 12px 18px; font-size: 14px; }
    .mode-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<a class="hub-home-btn" href="../index.html">← 홈</a>

<main>

  <!-- ========== 모드 선택 화면 ========== -->
  <section id="screen-menu">
    <h1>📝 일본어 문법 연습</h1>
    <p class="sub">카테고리를 골라 퀴즈를 풀어보세요. JLPT N3 합격의 지름길!</p>

    <div class="settings">
      <label><input type="radio" name="count" value="10"> 10문제</label>
      <label><input type="radio" name="count" value="20" checked> 20문제</label>
      <label><input type="radio" name="count" value="0"> 전체</label>
    </div>

    <div class="mode-grid" id="modeGrid"></div>

    <div class="best-scores" id="bestScores">
      <h3>🏆 최근 기록</h3>
      <ul id="bestScoresList"><li><span style="color:var(--text-muted)">아직 기록이 없어요</span></li></ul>
    </div>
  </section>

  <!-- ========== 퀴즈 화면 ========== -->
  <section id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <button class="btn ghost" onclick="quitQuiz()" style="padding:6px 12px; font-size:12px;">← 그만</button>
      <div><span id="qNum">1</span> / <span id="qTotal">20</span></div>
      <div>점수: <b id="qScore" style="color:var(--accent)">0</b></div>
    </div>

    <div class="progress-bar"><div id="progressFill" class="progress-bar-fill" style="width:0%"></div></div>

    <div class="question-card">
      <span class="question-cat" id="qCat"></span>
      <div class="question-text" id="qText"></div>
      <div id="answerArea"></div>
      <div id="feedback"></div>
      <div class="actions hidden" id="actions">
        <button class="btn ghost" onclick="skipQuestion()">건너뛰기 (S)</button>
        <button class="btn" onclick="nextQuestion()" id="nextBtn" style="margin-left:auto;">다음 → (Enter)</button>
      </div>
    </div>

    <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:12px;">
      💡 키보드: <b>1-4</b> 객관식 · <b>Enter</b> 제출/다음 · <b>S</b> 건너뛰기
    </p>
  </section>

  <!-- ========== 결과 화면 ========== -->
  <section id="screen-result" class="hidden">
    <div class="result-screen">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h1 style="margin:0;">수고하셨어요!</h1>
      <div class="result-score" id="resultScore">0%</div>
      <div class="result-fraction" id="resultFraction">0 / 0 정답</div>
      <div class="result-comment" id="resultComment"></div>
      <div class="result-actions">
        <button class="btn" onclick="retryQuiz()">다시 풀기</button>
        <button class="btn ghost" onclick="backToMenu()">메뉴로</button>
      </div>
      <div class="wrong-review hidden" id="wrongReview">
        <h3>📝 틀린 문제 복습</h3>
        <div id="wrongList"></div>
      </div>
    </div>
  </section>

</main>

<script src="./questions.js"></script>
<script>
  // ==================== 유틸 ====================
  const $ = (id) => document.getElementById(id);

  // 한자[|후리가나] → <ruby> 변환
  function renderRuby(text) {
    if (!text) return "";
    return text.replace(/\[([^|\]]+)\|([^\]]+)\]/g, "<ruby>$1<rt>$2</rt></ruby>");
  }

  // 배열 셔플
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // 히라가나/가타카나/한자 비교용 정규화
  function normalize(s) {
    return (s || "")
      .trim()
      .replace(/[\s　]/g, "")
      .replace(/[。、！？]/g, "");
  }

  // 카타카나 → 히라가나 변환 (답안 비교용)
  function kataToHira(s) {
    return s.replace(/[\u30A1-\u30F6]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0x60)
    );
  }

  // ==================== 카테고리 정의 ====================
  const CATEGORIES = [
    { id: "all",         icon: "🎯", title: "전체 랜덤",       desc: "모든 카테고리 섞어서",           filter: () => true },
    { id: "group",       icon: "🔢", title: "동사 그룹 구분",   desc: "1/2/3그룹 구분하기",             filter: q => q.cat === "group" },
    { id: "conjugation", icon: "🔄", title: "동사 활용",        desc: "ます/ない/의지/명령/가능",       filter: q => ["masu","nai","volition","imperative","potential","ta"].includes(q.cat) },
    { id: "te",          icon: "🔗", title: "て형·た형",         desc: "うつる→って, むぶぬ→んで",      filter: q => ["te","ta"].includes(q.cat) },
    { id: "passive-caus",icon: "⚡", title: "수동·사역·사역수동", desc: "受け身·使役 구분",                filter: q => ["passive","causative","caus-pass"].includes(q.cat) },
    { id: "conditional", icon: "🔀", title: "조건형",           desc: "ば/たら/なら/と",                filter: q => q.cat === "conditional" },
    { id: "particle",    icon: "📌", title: "조사",             desc: "は/が/を/に/で",                 filter: q => q.cat === "particle" },
    { id: "adj",         icon: "🌈", title: "형용사",           desc: "い형·な형 활용",                 filter: q => q.cat === "adj" },
    { id: "n5",          icon: "🟢", title: "N5 문법",          desc: "JLPT N5 기초 문법",              filter: q => q.cat === "n5" },
    { id: "n4",          icon: "🔵", title: "N4 문법",          desc: "JLPT N4 실용 문법",              filter: q => q.cat === "n4" },
    { id: "n3",          icon: "🩷", title: "N3 문법",          desc: "JLPT N3 핵심 문법",              filter: q => q.cat === "n3" },
    { id: "keigo",       icon: "🎎", title: "경어",             desc: "존경어·겸양어",                  filter: q => q.cat === "keigo" },
    { id: "mixed",       icon: "🔥", title: "종합·함정",         desc: "헷갈리는 포인트 집중 공략",      filter: q => q.cat === "mixed" },
  ];

  // ==================== 상태 ====================
  let state = {
    pool: [],          // 현재 퀴즈 문제 배열
    index: 0,          // 현재 문제 번호 (0-based)
    score: 0,          // 정답 수
    answered: false,   // 현재 문제 답했는지
    wrong: [],         // 틀린 문제들
    categoryId: null,  // 선택 카테고리
    selectedOption: -1 // 객관식 선택
  };

  // ==================== 메뉴 ====================
  function renderMenu() {
    const grid = $("modeGrid");
    grid.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const count = QUESTIONS.filter(cat.filter).length;
      if (count === 0) return;
      const btn = document.createElement("button");
      btn.className = "mode-card";
      btn.innerHTML = `
        <span class="mode-icon">${cat.icon}</span>
        <h3 class="mode-title">${cat.title}</h3>
        <p class="mode-desc">${cat.desc}</p>
        <span class="mode-count">${count}문제</span>
      `;
      btn.onclick = () => startQuiz(cat);
      grid.appendChild(btn);
    });
    renderBestScores();
  }

  function renderBestScores() {
    try {
      const scores = JSON.parse(localStorage.getItem("grammarQuizScores") || "[]");
      const list = $("bestScoresList");
      if (!scores.length) return;
      list.innerHTML = scores.slice(0, 5).map(s => {
        const cat = CATEGORIES.find(c => c.id === s.categoryId);
        return `<li><span>${cat ? cat.icon : "📝"} ${cat ? cat.title : s.categoryId}</span><span class="score">${s.percent}% (${s.score}/${s.total})</span></li>`;
      }).join("");
    } catch (e) {}
  }

  function saveScore(categoryId, score, total) {
    try {
      const scores = JSON.parse(localStorage.getItem("grammarQuizScores") || "[]");
      scores.unshift({
        categoryId,
        score, total,
        percent: Math.round((score / total) * 100),
        date: Date.now()
      });
      localStorage.setItem("grammarQuizScores", JSON.stringify(scores.slice(0, 20)));
    } catch (e) {}
  }

  // ==================== 퀴즈 시작 ====================
  function startQuiz(category) {
    const countSetting = parseInt(document.querySelector('input[name="count"]:checked').value, 10);
    const filtered = QUESTIONS.filter(category.filter);
    const shuffled = shuffle(filtered);
    const pool = countSetting > 0 ? shuffled.slice(0, countSetting) : shuffled;

    if (pool.length === 0) {
      alert("이 카테고리에는 문제가 없어요.");
      return;
    }

    state = {
      pool,
      index: 0,
      score: 0,
      answered: false,
      wrong: [],
      categoryId: category.id,
      selectedOption: -1
    };

    $("screen-menu").classList.add("hidden");
    $("screen-result").classList.add("hidden");
    $("screen-quiz").classList.remove("hidden");
    $("qTotal").textContent = pool.length;
    renderQuestion();
  }

  function renderQuestion() {
    const q = state.pool[state.index];
    state.answered = false;
    state.selectedOption = -1;

    $("qNum").textContent = state.index + 1;
    $("qScore").textContent = state.score;
    $("progressFill").style.width = ((state.index) / state.pool.length * 100) + "%";
    $("qCat").textContent = q.level || "문제";
    $("qText").innerHTML = renderRuby(q.q);
    $("feedback").innerHTML = "";
    $("actions").classList.add("hidden");

    const area = $("answerArea");
    area.innerHTML = "";

    if (q.type === "mc") {
      const wrap = document.createElement("div");
      wrap.className = "options";
      q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerHTML = `<span class="num">${i + 1}</span><span>${renderRuby(opt)}</span>`;
        btn.onclick = () => selectOption(i);
        btn.dataset.idx = i;
        wrap.appendChild(btn);
      });
      area.appendChild(wrap);
    } else {
      const wrap = document.createElement("div");
      wrap.className = "input-wrap";
      wrap.innerHTML = `
        <input type="text" id="answerInput" placeholder="히라가나 또는 한자로 입력..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button class="btn" onclick="submitInput()">제출</button>
      `;
      area.appendChild(wrap);
      setTimeout(() => $("answerInput")?.focus(), 50);
      $("answerInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !state.answered) {
          e.preventDefault();
          submitInput();
        }
      });
    }
  }

  // ==================== 답변 처리 ====================
  function selectOption(i) {
    if (state.answered) return;
    const q = state.pool[state.index];
    state.answered = true;
    state.selectedOption = i;

    const buttons = document.querySelectorAll(".option");
    buttons.forEach(b => b.disabled = true);

    const isCorrect = i === q.answer;
    buttons[i].classList.add(isCorrect ? "correct" : "wrong");
    if (!isCorrect) buttons[q.answer].classList.add("correct");

    showFeedback(isCorrect, q.options[q.answer], q.explain);
  }

  function submitInput() {
    if (state.answered) return;
    const q = state.pool[state.index];
    const input = $("answerInput");
    const userAnswer = normalize(input.value);
    if (!userAnswer) {
      input.focus();
      return;
    }

    const validAnswers = [q.answer, ...(q.alt || [])].map(normalize);
    const userHira = kataToHira(userAnswer);
    const isCorrect = validAnswers.some(a => {
      const ah = kataToHira(a);
      return ah === userHira || a === userAnswer;
    });

    state.answered = true;
    input.disabled = true;
    input.classList.add(isCorrect ? "correct" : "wrong");
    showFeedback(isCorrect, q.answer, q.explain);
  }

  function showFeedback(isCorrect, correctAnswer, explain) {
    const q = state.pool[state.index];
    if (isCorrect) {
      state.score++;
      $("qScore").textContent = state.score;
    } else {
      state.wrong.push({
        q: q.q,
        correct: typeof correctAnswer === "string"
          ? correctAnswer
          : (q.type === "mc" ? q.options[q.answer] : q.answer),
        explain: q.explain
      });
    }

    const fb = $("feedback");
    const correctText = q.type === "mc" ? q.options[q.answer] : q.answer;
    fb.innerHTML = `
      <div class="feedback ${isCorrect ? "correct" : "wrong"}">
        <div class="result">${isCorrect ? "✅ 정답!" : "❌ 틀렸어요"}</div>
        ${!isCorrect ? `<div class="correct-answer">정답: <b>${renderRuby(correctText)}</b></div>` : ""}
        <div class="explain">${renderRuby(explain || "")}</div>
      </div>
    `;
    $("actions").classList.remove("hidden");
    $("nextBtn").focus();
  }

  function nextQuestion() {
    state.index++;
    if (state.index >= state.pool.length) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }

  function skipQuestion() {
    if (state.answered) {
      nextQuestion();
      return;
    }
    const q = state.pool[state.index];
    state.wrong.push({
      q: q.q,
      correct: q.type === "mc" ? q.options[q.answer] : q.answer,
      explain: q.explain
    });
    state.answered = true;
    nextQuestion();
  }

  function quitQuiz() {
    if (confirm("퀴즈를 그만두시겠어요? 진행 상황은 저장되지 않아요.")) {
      backToMenu();
    }
  }

  // ==================== 결과 ====================
  function finishQuiz() {
    $("progressFill").style.width = "100%";
    $("screen-quiz").classList.add("hidden");
    $("screen-result").classList.remove("hidden");

    const total = state.pool.length;
    const percent = Math.round((state.score / total) * 100);
    $("resultScore").textContent = percent + "%";
    $("resultFraction").textContent = `${state.score} / ${total} 정답`;

    let emoji, comment;
    if (percent === 100) { emoji = "🏆"; comment = "완벽! 이 카테고리는 정복했어요!"; }
    else if (percent >= 90) { emoji = "🌟"; comment = "거의 완벽! 훌륭해요!"; }
    else if (percent >= 75) { emoji = "🎉"; comment = "좋아요! 조금만 더 다듬으면 완벽!"; }
    else if (percent >= 60) { emoji = "👍"; comment = "괜찮아요. 틀린 문제 복습해봐요!"; }
    else if (percent >= 40) { emoji = "💪"; comment = "문법 정리 다시 훑어볼 타이밍!"; }
    else { emoji = "📚"; comment = "천천히 문법 정리부터 다시 읽어봐요 ✊"; }
    $("resultEmoji").textContent = emoji;
    $("resultComment").textContent = comment;

    // 틀린 문제 복습
    const wrongDiv = $("wrongReview");
    const wrongList = $("wrongList");
    if (state.wrong.length > 0) {
      wrongDiv.classList.remove("hidden");
      wrongList.innerHTML = state.wrong.map(w => `
        <div class="wrong-review-item">
          <div class="q">${renderRuby(w.q)}</div>
          <div class="a">정답: <b>${renderRuby(String(w.correct))}</b></div>
          <div class="a" style="margin-top:4px;">${renderRuby(w.explain || "")}</div>
        </div>
      `).join("");
    } else {
      wrongDiv.classList.add("hidden");
    }

    saveScore(state.categoryId, state.score, total);
  }

  function retryQuiz() {
    const cat = CATEGORIES.find(c => c.id === state.categoryId);
    if (cat) startQuiz(cat);
  }

  function backToMenu() {
    $("screen-quiz").classList.add("hidden");
    $("screen-result").classList.add("hidden");
    $("screen-menu").classList.remove("hidden");
    renderBestScores();
  }

  // ==================== 키보드 ====================
  document.addEventListener("keydown", (e) => {
    if ($("screen-quiz").classList.contains("hidden")) return;
    const q = state.pool[state.index];
    if (!q) return;

    const inputEl = document.activeElement?.tagName === "INPUT";

    if (!state.answered && q.type === "mc" && !inputEl) {
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= q.options.length) {
        selectOption(n - 1);
        e.preventDefault();
      }
    }
    if (e.key === "Enter" && state.answered) {
      nextQuestion();
      e.preventDefault();
    }
    if ((e.key === "s" || e.key === "S") && !inputEl) {
      skipQuestion();
      e.preventDefault();
    }
  });

  // ==================== 초기화 ====================
  renderMenu();
</script>
</body>
</html>
